# ───────────────────────────────────────────────────────────
# IDEA — Docker Compose (development)
# Data layer first: postgres + redis on a private network.
# Backend and frontend services are added in later commits.
# ───────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:16-alpine
    container_name: idea-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - idea-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: idea-redis
    # AOF persistence so hot exam state survives a restart
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - idea-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  idea-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
