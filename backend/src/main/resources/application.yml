spring:
  application:
    name: idea-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:idea_db}
    username: ${POSTGRES_USER:idea_user}
    password: ${POSTGRES_PASSWORD:idea_user}

  jpa:
    hibernate:
      # Schema is owned by Flyway migrations; Hibernate only validates it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  jwt:
    # HS256 signing key (>= 32 bytes). The default is for local/test only —
    # always override JWT_SECRET in real environments.
    secret: ${JWT_SECRET:local-dev-only-change-me-please-0123456789-abcdef}
    access-expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:30}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}

server:
  port: ${BACKEND_PORT:8080}

logging:
  level:
    com.idea: DEBUG
