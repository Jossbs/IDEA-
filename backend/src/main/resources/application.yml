spring:
  application:
    name: idea-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:idea_db}
    username: ${POSTGRES_USER:idea_user}
    password: ${POSTGRES_PASSWORD:idea_user}

  jpa:
    hibernate:
      # Schema is owned by Flyway migrations; Hibernate only validates it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${BACKEND_PORT:8080}

logging:
  level:
    com.idea: DEBUG
